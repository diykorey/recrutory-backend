<div class="clearfix" ng-class="currentVacancy ? 'col-lg-6' : 'col-lg-3'">
    <div class="content row clearfix" ng-click="selectVacancy(vacancy)" ng-class="vacancy.id == currentVacancy.id ? 'selected' :''">
        <div ng-hide="vacancy.allowArchive == true">
            <!-- Default card content -->
            <div class="clearfix row">
                <!-- <div class="col-lg-3 pull-left action-btns"><span class="number">{{vacancy.id}}</span><span  class="badge hot">HOT</span>
</div>
 -->
                <div class="col-lg-4 action-btns">
                    <div class="col-lg-6 text-center number">{{vacancy.id}}</div>
                    <div class="col-lg-6 text-center hot" ng-if="vacancy.hot == true">HOT</div>
                </div>
                <div class="col-lg-8 pull-right clearfix" style="padding:0">
                    <md-button ng-click="quickAction.main(vacancy)" class="md-fab main md-accent pull-right" aria-label="refresh">
                        <md-tooltip>
                            Main
                        </md-tooltip>
                        M
                        </md-icon>
                    </md-button>
                    <md-button ng-click="quickAction.flow(vacancy)" class="md-fab flow md-accent pull-right" aria-label="refresh">
                        <md-tooltip>
                            Flow
                        </md-tooltip>
                        F
                        </md-icon>
                    </md-button>
                    <md-button ng-click="quickAction.notes(vacancy)" class="md-fab note md-primary pull-right" aria-label="refresh">
                        <md-tooltip>
                            Note
                        </md-tooltip>
                        N
                        </md-icon>
                    </md-button>
                    <md-button ng-click="quickAction.archive(vacancy,'archive')" class="md-fab archive md-primary pull-right" aria-label="refresh">
                        <md-tooltip>
                            Archive
                        </md-tooltip>
                        A
                        </md-icon>
                    </md-button>
                </div>
            </div>
            <div class="name row">{{vacancy.name}}</div>
            <div class="desc row">
                <label>Description :</label>
                <div>{{vacancy.requirements | limitTo: 110}}{{vacancy.requirements.length > 120 ? '...': ''}}</div>
            </div>
            <div class="tags row">
                <label>Tags:</label>
                <tag-list tags="vacancy.tags"> </tag-list>
            </div>
            <div class="date row">{{vacancy.createTime|date:'medium'}}</div>
        </div>
        <!-- End Default card content -->
        <div ng-show="vacancy.allowArchive == true" class="text-center col-centered col-lg-11 archive-warn-wrapper">
            <!-- Archive card content -->
            <i class="glyphicon glyphicon-trash text-center"></i>
            <p>Are you sure that you want
                <br>to archive this vacancy ?
            </p>
            <div class="margin-t-20">
                <md-button class="md-raised md-warn inline" ng-click="archiveVacancy(vacancy)">ARCHIVE</md-button>
                <md-button ng-click="quickAction.archive(vacancy,'unarchive')">UNDO</md-button>
            </div>
        </div>
        <!-- End Archive card content -->
    </div>
