<div ng-controller="candidateCtrl">
    <div class="filters col-lg-11 col-centered">
        <div class="col-lg-1" ng-repeat="filter in filters">
            <md-checkbox ng-model="filterValues[filter.name].value" ng-change="filtercandidates()" class="md-warn" aria-label="{{filter.name}}">
                {{filter.name}}
            </md-checkbox>
        </div>
    </div>
    <div ng-class="currentCandidate ? 'col-lg-7' : 'col-centered col-lg-11'">
        <table class="table  tableMaterial" style="border-radius:5px;background:#fff">
            <thead style="border:none">
                <tr>
                    <th ng-repeat="column in columnsTable">{{column.heading.toUpperCase()}}</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="candidate in candidatesData | filter: {hot : filterValues['Hot'].filter} | filter: {hot : filterValues['state'].filter}" ng-class="candidate == currentCandidate ? 'selectedTable' : 'none' " ng-click="selectCandidate(candidate)">
                    <td>{{candidate.summaryCard.predefinedFields.NAME_SURNAME.fieldValue}}</td>
                    <td><a href="#!" class="collection-item"><span class="badge open">{{candidate.state}}</span></a><a ng-if="candidate.hot == true" href="#!" class="collection-item"><span class="badge hot">HOT</span></a></td>
                    <td>{{candidate.createTime|date:'medium'}}</td>
                    <td>
                        <tag-list tags="candidate.tags"> </tag-list>
                    </td>
                    <td><span class="badge open">{{candidate.number}}</span></a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<!-- End Candidate card wrapper  -->
<div ng-show="currentCandidate" class="clearfix sideView " ng-class="currentCandidate ? 'col-lg-5' : 'hide'">
    <!-- Vacancy side menu  -->
    <md-toolbar md-scroll-shrink>
        <!-- Nav Vacancy side menu  -->
        <div class="md-toolbar-tools clearfix">
            <div class="col-lg-11"><span class="heading-vacancy-side">{{currentCandidate.summaryCard.predefinedFields.NAME_SURNAME.fieldValue}}</span></div>
            <!-- <div class="col-lg-1"><span ng-show="currentCandidate.hot == true" class="badge hot">HOT</span></div> -->
        </div>
    </md-toolbar>
    <!-- End Nav Vacancy side menu  -->
    <md-content>
        <!-- Content Vacancy side menu  -->
        <div class="wrapper-sidemenu col-centered">
            <!-- Wrapper side menu  -->
            <md-tabs md-selected="selectedIndex" flex>
                <md-tab ng-repeat="tab in tabsCandidateDetails"><a href='javascript:void(0)'>{{tab.heading}}</a> </md-tab>
            </md-tabs>
            <div ng-show="updateProcess" class="progress progress-details" style="margin:0px">
                <div class="indeterminate"></div>
            </div>
            <div ng-show="selectedIndex == 0">
                <candidate-side-main></candidate-side-main>
            </div>
            <!-- End tab Main  -->
            <div ng-show="selectedIndex == 1">
                <candidate-side-flow></candidate-side-flow>
            </div>
            <!-- End Tab Flow  -->
            <div ng-show="selectedIndex == 2">
                <candidate-side-suggestions></candidate-side-suggestions>
            </div>
            <!-- End tab Suggestions  -->
            <div ng-show="selectedIndex == 3">
                <!-- Tab Notes  -->
                <notes class="row clearfix" style="padding:20px 0"></notes>
            </div>
            <!-- End tab Notes  -->
        </div>
        <!-- End tab Notes  -->
</div>
<!--  End Wrapper side menu  -->
</md-content>
<!-- End Content Vacancy side menu  -->
</div>
<!-- Vacancy side menu  -->
</div>
<!-- End Dashboard wrapper  -->
