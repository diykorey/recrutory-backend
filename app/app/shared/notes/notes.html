<div>
    <div class="col-centered section-edit col-lg-11 margin-t-20 text-center">
       <div class="col-lg-7 col-centered">
            <md-input-container flex ng-show="notes[notes.length - 1].new == true">
                <h5>{{note.placeholder}}</h5>
                <textarea autofocus="true" ng-model="notes[notes.length - 1].comment" columns="1"></textarea>
            </md-input-container>
        </div>
   
        <md-button class="md-raised md-accent button-text-white inline" ng-click='noteAction.add()' ng-hide="notes[notes.length - 1].new == true">Add note</md-button>
        <md-button class="md-raised md-accent button-text-white inline" ng-click='noteAction.save()' ng-show="notes[notes.length - 1].new == true">Save</md-button>
        <md-button class="md-raised md-warn inline" ng-click='noteAction.discard()' ng-show="notes[notes.length - 1].new == true">Discard</md-button>
             <div class="col-centered separator col-lg-12 margin-t-20 margin-b-20" ng-show="notes.length > 1"></div>
        <div ng-show="!note.new" ng-repeat="note in notes" class="text-left clearfix">
            <div class="row">
                <div ng-hide="note.deleteNote">
                    <div class="col-lg-9 pull-left">
                        <h5>Note {{note.creationDate|date:'medium'}}</h5>
                        <span ng-show="!note.editNote">{{note.comment}}</span>
                        <md-input-container flex ng-show="note.editNote">
                            <textarea autofocus="note.editNote" ng-model="note.comment" columns="1"></textarea>
                        </md-input-container>
                    </div>
                </div>
                <div ng-show="note.deleteNote">Are you sure you want to delete this note ?</div>
                <div class="col-lg-3 note-actions-inner">
                    <div class="col-lg-6">
                        <md-button ng-click="note.deleteNote = false" ng-show="note.deleteNote">Undo</md-button>
                        <md-button ng-click="note.editNote = true" ng-hide="note.deleteNote || note.editNote">Edit</md-button>
                        <md-button ng-show="note.editNote" ng-click="noteAction.edit(note)">Save</md-button>
                    </div>
                    <div class="col-lg-6">
                        <md-button ng-hide="note.editNote" ng-click="noteAction.deletenote(note)">Delete</md-button>
                        <md-button ng-click="note.editNote = false" ng-show="note.editNote">Cancel</md-button>
                    </div>
                </div>
            </div>

        </div>
     
    </div>
</div>
