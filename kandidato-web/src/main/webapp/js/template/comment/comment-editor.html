<div class="panel panel-default">
    <div class="panel-heading">
        <span>
            <h3 class="panel-title">Add comment:</h3>
        </span>
        <span>
            <button id="save-comment-btn" type="button" class="btn btn-success">Save</button>
        </span>
    </div>
    <div  class="panel-body">
        <textarea id="comment-text" class="form-control" placeholder="Comment text">
            <%= comment %>
        </textarea>
    </div>
</div>
