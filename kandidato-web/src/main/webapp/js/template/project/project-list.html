<div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>#</th>
            <th>Project</th>
            <th>Customer</th>
            <th>Description</th>
            <th>Create Time</th>
        </tr>
        </thead>
        <tbody id="projectListBody">
        <% _.each(models, function(project){ %>
        <tr>
            <td></td>
            <td><%= project.get("name")%></td>
            <td><%= project.get("customer").name%></td>
            <td><%= project.get("description")%></td>
            <td><%= project.get("creationTime")%></td>
        </tr>
        <% }); %>

        </tbody>
    </table>
</div>
