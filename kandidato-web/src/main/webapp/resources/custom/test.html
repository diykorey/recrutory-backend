<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css">

    <!-- Optional theme -->
    <link rel="stylesheet" href="../bootstrap/css/bootstrap-theme.min.css">

</head>
<body>
<div class="container-fluid" id="mainContainer">
    <h2>Dashboard</h2>

    <div id="main_row" class="row-fluid" style="height: 100%">
        <!-- main_row  begin -->
        <div id="vacancyBoardHolder" class="col-xs-6" style="height: 100%"></div>
        <div id="vacancyManagementHolder" class="col-xs-6" style="border-left: 2px solid #EEE; height: 100%">
            <div class="panel panel-default">
                <div class="panel-heading">
                    New Vacancy
                    <button type="button" class="btn btn-default btn-xs  pull-right">
                        <span class="glyphicon glyphicon-save"></span> Save
                    </button>
                </div>
                <div class="panel-body">

                    <!-- Tab panes -->
                    <div class="tab-content">
                        <div class="tab-pane active" id="vacancyMainTab">
                            <form role="form">
                                <div class="form-group">
                                    <label for="vacancyRequirements">Requirements:</label>
                                    <textarea id="vacancyRequirements" class="form-control" rows="3"></textarea>
                                </div>
                                <div class="form-group">
                                    <label for="projectDescription">Project Description:</label>
                                    <textarea id="projectDescription" class="form-control" rows="3"></textarea>
                                </div>
                            </form>
                        </div>
                        <div class="tab-pane" id="vacancyFlowsTab">
                            <table class="table table-hover table-striped">
                                <thead>
                                <tr>
                                    <th>#</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Username</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>Mark</td>
                                    <td>Otto</td>
                                    <td>@mdo</td>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>Jacob</td>
                                    <td>Thornton</td>
                                    <td>@fat</td>
                                </tr>
                                <tr>
                                    <td>3</td>
                                    <td>Larry</td>
                                    <td>the Bird</td>
                                    <td>@twitter</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="tab-pane" id="vacancyCommentsTab">3...</div>
                        <div class="tab-pane" id="vacancyTaskTab">4...</div>
                    </div>
                    <nav class="navbar navbar-default" role="navigation">
                        <div class="container-fluid">
                            <!-- Collect the nav links, forms, and other content for toggling -->
                            <div class="collapse navbar-collapse" id="vacancyNavbar">
                                <ul class="nav navbar-nav" id="vacancyTabs">
                                    <li class="active"><a href="#vacancyMainTab" data-toggle="tab">Main</a></li>
                                    <li><a href="#vacancyFlowsTab" data-toggle="tab">Flows</a></li>
                                    <li><a href="#vacancyCommentsTab" data-toggle="tab">Comments</a></li>
                                    <li><a href="#vacancyTaskTab" data-toggle="tab">Task</a></li>
                                </ul>
                            </div>
                            <!-- /.navbar-collapse -->
                        </div>
                        <!-- /.container-fluid -->
                    </nav>


                </div>
            </div>
        </div>
    </div>
</div>
<script src="../jquery/jquery-2.1.0.min.js"></script>
<script src="../bootstrap/js/bootstrap.min.js"></script>
<!-- add if needed <script src="http://ajax.cdnjs.com/ajax/libs/json2/20110223/json2.js"></script> -->
<script>
    function Project(projectJson) {
        this.id = null;
        this.name = "";
        this.description = "";
        if (projectJson) {
            for (var prop in projectJson) this[prop] = projectJson[prop];
        }
    }
    function Vacancy(vacancyJson) {
        this.id = null;
        this.state = "OPEN";
        this.hot = false;
        this.tag = [];
        this.project = new Project()
        if (vacancyJson) {
            for (var prop in vacancyJson) this[prop] = vacancyJson[prop];
        }
    }
    /*   alternative constructor
     Vacancy.prototype.init = function (vacancyJson) {
     for (var prop in vacancyJson) this[prop] = vacancyJson[prop];
     };     */


    function newVacancyView() {
        var vacancy = new Vacancy();
        var title = 'New Vacancy';
        var saveBtn = 'Save'
        var vacancyTabPanel = '<div class="tab-content">' +
                '<div class="tab-pane active" id="vacancyInfoTab">'+
                '</div>' +
                '</div>';

        var vacancyMainPanel = '<div class="panel panel-default">' +
                '<div class="panel-heading">' + title +
                '<button type="button" class="btn btn-default btn-xs  pull-right">' +
                '<span class="glyphicon glyphicon-save"></span>' + saveBtn +
                '</button>' +
                '</div>' +
                ' <div class="panel-body">' + vacancyTabPanel +
                '</div>' +
                '</div>';
        return vacancyMainPanel;
    }
    function updateVacancyView(vacancyJson) {
        var vacancy = new Vacancy(vacancyJson);
        return vacancy;
    }
    function createVacancyManager(vacancyJson) {
        var view;
        if (vacancyJson) {
            view = newVacancyView();
        } else {
            view = updateVacancyView(vacancyJson);
        }
        $("#vacancyManagementHolder").append(view);
    }

</script>

<script src="../custom/js/test.js"></script>
</body>
</html>
