        <div class="modal-content">

            <div class="modal-header alert alert-success" style="padding:10px;"> Warning!

                Would you like to save changes?
            </div>
            <div class="modal-footer" style="padding:10px;">
                <button type="button" class="btn btn-default btn-xs" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary btn-xs" onclick="saveVacancyChanges()">Save changes</button>
            </div>
        </div>
        <!-- /.modal-content -->
    </div>
    <!-- /.modal-dialog -->
